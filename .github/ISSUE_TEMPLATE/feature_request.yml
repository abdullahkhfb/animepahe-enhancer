name: 💡 Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! See [CONTRIBUTING.md](https://github.com/abdullahkhfb/animepahe-enhancer/blob/main/CONTRIBUTING.md#issue-guidelines) for what makes a good feature request.

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't already been suggested
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation or frustration that led to this idea — the problem first, not the solution yet.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Optional, but helpful — what would you like to see happen?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, and why they didn't fit as well
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the extension does this relate to?
      multiple: true
      options:
        - Continue Watching
        - DUB Detector
        - Smart Search
        - Intro / Outro Skip
        - Popup / settings UI
        - Something else / not sure
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
    validations:
      required: false
