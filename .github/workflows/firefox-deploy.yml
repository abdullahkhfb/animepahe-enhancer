name: Publish Firefox Extension

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Extension Zip
        run: zip -r extension.zip . -x "*.git*" ".github/*" "README.md" ".gitignore"

      - name: Upload to Firefox (AMO)
        uses: browser-actions/release-firefox-addon@v0.2.1
        with:
          addon-id: "animepahe-enhancer@abdullahkhfb.github.io"
          addon-path: extension.zip
          auth-api-issuer: ${{ secrets.AMO_JWT_ISSUER }}
          auth-api-secret: ${{ secrets.AMO_JWT_SECRET }}
          release-note: ${{ github.event.release.body }}
